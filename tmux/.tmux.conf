# Prefix más cómodo: Ctrl+a en vez de Ctrl+b
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Mouse habilitado (scroll, click en paneles, resize)
set -g mouse on

# Paneles y ventanas empiezan en 1, no en 0
set -g base-index 1
setw -g pane-base-index 1

# Dividir paneles con teclas más intuitivas
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Nuevas ventanas abren en el directorio actual
bind c new-window -c "#{pane_current_path}"

# Moverse entre paneles con Alt+flechas (sin prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Historial más largo
set -g history-limit 10000

# Colores
set -g default-terminal "screen-256color"

# Barra de estado limpia
set -g status-style 'bg=default,fg=white'
set -g status-left '#[fg=green][#S] '
set -g status-right '%H:%M'

# Recargar config con prefix+r
bind r source-file ~/.tmux.conf \; display "Config recargada"
